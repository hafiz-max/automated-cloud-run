name: Continuous Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Authenticate, Provision, Build, and Run
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    env:
      PROJECT_ID: 'YOUR_PROJECT_ID'      # Replace with your GCP project ID
      REGION: 'asia-southeast1'          # Replace with your GCP region
      WIF_PROVIDER: 'projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      SA_EMAIL: 'github-actions-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # The Keyless Auth Magic
    - name: Authenticate via Google Workload Identity Federation
      uses: google-github-actions/auth@v2
      with:
        token_format: 'access_token'
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.SA_EMAIL }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker to Auth with Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    # Run Infrastructure Provisioning
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Apply
      working-directory: ./terraform
      run: |
        terraform init
        terraform apply -var="project_id=${{ env.PROJECT_ID }}" -var="region=${{ env.REGION }}" -auto-approve

    # Build and Deploy Application
    - name: Build and Push Lightweight Docker Container
      run: |
        TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/app-images/web-app:${{ github.sha }}"
        docker build -t $TAG ./app
        docker push $TAG

        gcloud run services update cloud-run-c-app \
          --image=$TAG \
          --region=${{ env.REGION }}